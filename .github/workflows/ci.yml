name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Python check deps
        run: python -m pip install pandas numpy requests Pillow python-dotenv pyyaml
      - name: Python compile
        run: |
          python -m py_compile scripts/check_data_health.py scripts/send_line_holdings.py scripts/db_importer.py trading_code_ml/scripts/test_pandas_logic.py frontend/scripts/generate_dashboard_data.py trading_code_ml/src/risk_manager.py trading_code_ml/scripts/run_portfolio_strategy_wfa.py trading_code_ml/scripts/run_rank_portfolio_backtest.py
      - name: Python self-check
        run: python trading_code_ml/scripts/test_pandas_logic.py
      - name: Frontend build
        working-directory: frontend
        run: |
          npm ci
          npm run build
